name: Publish Docker Images to GHCR

on:
  push:
    branches:
      - main
  release:
    types: [published]

permissions:
  packages: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push REST Headless Runner
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/momot-headless:latest
            ghcr.io/${{ github.repository_owner }}/momot-headless:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and Push MCP Server
        uses: docker/build-push-action@v5
        with:
          context: .
          file: mcp/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/momot-mcp:latest
            ghcr.io/${{ github.repository_owner }}/momot-mcp:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
